{% extends 'base.html' %}

{% block content %}
<video autoplay muted loop playsinline class="staff-video-bg">
    <source src="{{ url_for('static', filename='video/background_staff.mp4') }}" type="video/mp4">
</video>

<div class="staff-video-overlay"></div>
<div class="auth-page">
    <div class="auth-box small-auth">
        <h1>Staff Login</h1>
        <div class="cute-line"></div>

        <form method="POST" action="{{ url_for('staff_login') }}">
            <label>Username:</label>
            <div class="input-box">
                <i class='bx bx-user-badge'></i>
                <input type="text" name="username" placeholder="Enter staff username" required>
            </div>

            <label>Password:</label>
            <div class="input-box">
                <i class='bx bx-lock-alt'></i>
                <input type="password" name="password" id="password" placeholder="Enter password" required>
                <i class='bx bx-show eye-icon' onclick="togglePassword()"></i>
            </div>

            <button class="auth-btn" type="submit">Login</button>

            <p class="auth-link">
                Back to
                <a href="{{ url_for('login') }}">Student Login</a>
            </p>
        </form>
    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}
</script>
{% endblock %}
